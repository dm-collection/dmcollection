spring:
  config:
    import: optional:configtree:/run/secrets/
  application:
    name: Server
  datasource:
    url: jdbc:postgresql://${dmcollection_db_host:localhost}:${dmcollection_db_port:5432}/${dmcollection_db_name:dmcollection}
    username: ${dmcollection_db_user:dev_user}
    password: ${dmcollection_db_password:devpw}
  flyway:
    locations: classpath:db/migration
dmcollection:
  image-storage-path: ${dmcollection_image_storage_path:${user.home}/dmcollection-images}
  card-page:
    default-size: 40
    max-size: 100
  registration-code: ${dmcollection_registration_code:}
  remember-me-key: ${dmcollection_remember_me_key:devkey}
  card-data-path: ${dmcollection_card_data_path:./data/card-data.json}
server:
  servlet:
    session:
      cookie:
        same-site: lax
        secure: true
        http-only: true
        max-age: 86400
