services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dmcollection
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: devpw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d dmcollection"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DMCOLLECTION_IMAGE_STORAGE_PATH: /images
      DMCOLLECTION_DB_HOST: db
      DMCOLLECTION_DB_NAME: dmcollection
      DMCOLLECTION_DB_USER: dev_user
      DMCOLLECTION_DB_PASSWORD: devpw
    volumes:
      - type: bind
        source: ./dmcollection-images
        target: /images
      - type: bind
        source: ./server/data
        target: /home/nonroot/data


volumes:
  pgdata:
